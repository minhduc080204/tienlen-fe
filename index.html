<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a1a1a" />
    <title>Tiến Lên Miền Núi</title>
    <style>
      body {
        background-color: #1a1a1a;
        margin: 0;
      }
      .initial-loader-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100dvh;
        width: 100vw;
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .initial-loader-logo {
        width: 120px;
        height: 120px;
        border-radius: 20px;
        margin-bottom: 24px;
        animation: pulse 1.5s infinite ease-in-out;
      }
      .initial-loader-text {
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 1px;
      }
      .initial-loader-spinner {
        margin-top: 16px;
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader-container">
        <img src="/logo.png" alt="Logo" class="initial-loader-logo" />
        <div class="initial-loader-text">Đang tải...</div>
        <div class="initial-loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
